# ─── Koyeb Deployment Configuration ─────────────────────
# Docs: https://www.koyeb.com/docs
#
# Deploy via Koyeb CLI or Dashboard:
#   1. Connect your GitHub repo in Koyeb Dashboard
#   2. Select Docker builder, Dockerfile path: docker/api.Dockerfile
#   3. Set environment variables (see koyeb-env.example.yaml)
#   4. Choose Nano instance (free tier: 1 Nano per account)
#
# Or via CLI:
#   koyeb app create sayak-ai-chatbot
#   koyeb service create api \
#     --app sayak-ai-chatbot \
#     --git github.com/YOUR_USER/sayak-ai-chatbot \
#     --git-branch main \
#     --git-docker-dockerfile docker/api.Dockerfile \
#     --git-docker-context . \
#     --instance-type nano \
#     --regions was \
#     --port 3000:http \
#     --route /:3000 \
#     --checks 3000:http:/api/health \
#     --env NODE_ENV=production \
#     --env API_PORT=3000

name: sayak-ai-chatbot
type: web
builder: docker
docker:
  dockerfile: docker/api.Dockerfile
  context: .
instance_type: nano          # Free tier: 512MB RAM, 0.1 vCPU
regions:
  - was                      # Washington D.C.
ports:
  - port: 3000
    protocol: http
routes:
  - path: /
    port: 3000
health_checks:
  - type: http
    port: 3000
    path: /api/health
    interval: 30
    timeout: 5
    retries: 3
scaling:
  min: 1
  max: 1
