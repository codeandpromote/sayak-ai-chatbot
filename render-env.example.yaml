# ─── Render Environment Group: sayak-chatbot-env ──────────
#
# Create in Render Dashboard:
#   Dashboard → Environment Groups → New Environment Group
#   Name: sayak-chatbot-env
#
# Then add the variables below. This file is for documentation
# only — do NOT commit actual secrets.
#
# No credit card required for Render free tier.

# ─── Database ──────────────────────────────────────────
# Neon.tech (free, no card: 0.5GB storage, pgvector, no expiry)
# Sign up: https://neon.tech
# After creating project, run in SQL Editor:
#   CREATE EXTENSION IF NOT EXISTS vector;
DATABASE_URL: postgresql://neondb_owner:xxx@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require

# ─── Redis ─────────────────────────────────────────────
# Upstash (free, no card: 10K commands/day, 256MB)
# Sign up: https://upstash.com
# NOTE: App works without Redis for all core features.
#       Redis is only needed if you enable BullMQ job queues later.
REDIS_URL: rediss://default:xxx@us1-xxx.upstash.io:6379

# ─── Authentication / JWT ──────────────────────────────
# Generate with: openssl rand -base64 48
JWT_SECRET: CHANGE_ME
JWT_REFRESH_SECRET: CHANGE_ME
JWT_EXPIRATION: 15m
JWT_REFRESH_EXPIRATION: 7d

# ─── LLM Providers ────────────────────────────────────
# At least ONE required for chat/RAG
# Gemini (free, no card: 15 RPM, 1M tokens/day)
#   https://aistudio.google.com/apikey
GEMINI_API_KEY: ""
# Groq (free, no card: 30 RPM, 6K tokens/min)
#   https://console.groq.com/keys
GROQ_API_KEY: ""

# ─── Application URLs ─────────────────────────────────
# Fill in AFTER deploying each service
API_URL: https://sayak-ai-chatbot-api.onrender.com
DASHBOARD_URL: https://sayak-ai-chatbot.vercel.app
WIDGET_CDN_URL: https://sayak-ai-chatbot-widget.vercel.app

# ─── CORS ──────────────────────────────────────────────
CORS_ORIGINS: https://sayak-ai-chatbot.vercel.app,https://sayak-ai-chatbot-widget.vercel.app

# ─── Runtime ───────────────────────────────────────────
NODE_ENV: production
API_PORT: "3000"
