# ─── Render Environment Group: sayak-chatbot-env ──────────
#
# Create this as an environment group in the Render Dashboard:
#   Dashboard -> Environment Groups -> New Environment Group
#   Name: sayak-chatbot-env
#
# Then add the following variables. This file is for documentation
# only -- do NOT commit actual secrets.
#
# Docs: https://docs.render.com/environment-groups

# ─── Database ────────────────────────────────────────────
# Use Render's managed PostgreSQL (free tier: 256MB, 90-day expiry)
# or an external provider like Neon (free tier: 512MB, no expiry)
DATABASE_URL: postgresql://user:password@host:5432/sayak_chatbot?schema=public

# ─── Redis ───────────────────────────────────────────────
# Render does not offer free Redis. Options:
#   - Upstash Redis (free tier: 10k commands/day)
#   - Railway Redis (free trial)
#   - Remove Redis dependency if not using BullMQ queues
REDIS_URL: redis://default:password@host:6379

# ─── Authentication / JWT ────────────────────────────────
# Generate strong random secrets: openssl rand -base64 48
JWT_SECRET: CHANGE_ME_generate_with_openssl_rand_base64_48
JWT_REFRESH_SECRET: CHANGE_ME_generate_with_openssl_rand_base64_48
JWT_EXPIRATION: 15m
JWT_REFRESH_EXPIRATION: 7d

# ─── LLM Providers ──────────────────────────────────────
# At least one is required for RAG/chat functionality
GEMINI_API_KEY: ""       # Google AI Studio: https://aistudio.google.com/apikey
GROQ_API_KEY: ""         # Groq Console: https://console.groq.com/keys

# ─── Application URLs ───────────────────────────────────
# Update these after deploying each service
API_URL: https://api-YOURAPP.onrender.com
DASHBOARD_URL: https://your-dashboard.vercel.app
WIDGET_CDN_URL: https://your-widget.vercel.app

# ─── CORS ────────────────────────────────────────────────
# Comma-separated list of allowed origins
CORS_ORIGINS: https://your-dashboard.vercel.app,https://your-widget.vercel.app

# ─── Runtime ─────────────────────────────────────────────
NODE_ENV: production
API_PORT: "3000"
