name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Build shared (other packages depend on it) ───
      - name: Build shared package
        run: pnpm --filter @sayak-chatbot/shared build

      # ─── Generate Prisma client (API depends on it) ──
      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      # ─── Lint ─────────────────────────────────────────
      - name: Lint API
        run: pnpm --filter api lint

      - name: Lint Dashboard
        run: pnpm --filter dashboard lint

      # ─── Type-check ──────────────────────────────────
      - name: Type-check shared
        run: pnpm --filter @sayak-chatbot/shared build

      - name: Type-check API
        run: pnpm --filter api build

      - name: Type-check Dashboard
        run: pnpm --filter dashboard build

      - name: Type-check Widget
        run: pnpm --filter widget build
